<!DOCTYPE html>
<html lang="nl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- From OpenNDS splash page -->
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
		<meta http-equiv="Pragma" content="no-cache">
		<meta http-equiv="Expires" content="0">

		<link rel="stylesheet" href="../static/css/fontawesome.min.css" />
		<link rel="stylesheet" href="../static/css/regular.min.css" />
		<link rel="stylesheet" href="../static/css/oradio3.css" />
		<link rel="stylesheet" href="../static/css/captiveportal.css" />

		<title>Oradio wifi instellen</title>

		<script>
			// Convert template variables to javascript
			const networks = {{ networks|tojson }};
			const spotify = {{ spotify|tojson }};

			// Function to submit the network and password
			async function submitCredentials()
			{
				// Cancel the default action that belongs to the event
				event.preventDefault();

				// Clear old notifications
				document.getElementById('notification_credentials').innerHTML = "";
				document.getElementById('notification_spotify').innerHTML = "";

				// Get notification element
				const notification = document.getElementById('notification_credentials');

				// Get selected network info
				const ssid = document.getElementById("SSIDs").value;
				if (ssid == "")
				{
					notification.innerHTML = "<div class='error'>Kies een wifi netwerk</div>";
					return;
				}

				// Get password
				const pswd = document.getElementById("pswd").value;
				if (pswd.length < 8)
				{
					notification.innerHTML = "<p class='error'>Wachtwoord moet minimaal 8 karakters zijn</p>";
					return;
				}

				// Show waiting indicator
				document.getElementById('waiting').style.display = "block";

				// Set error template
				const errorMessage = `Instellen van netwerk '${ssid}' is mislukt`;

				try
				{
					// Send credentials to server
					const response = await fetch('/wifi_connect',
					{
						method: 'POST',
						headers: {'Content-Type': 'application/json'},
						body: JSON.stringify({ "ssid": ssid, "pswd": pswd })
					});

					// Handle server response
					if (response.ok)
					{
						notification.innerHTML = `<p>De huidige verbinding wordt verbroken<br>Oradio probeert te verbinden met '${ssid}'</p>`;
					}
					else
					{
						// Wait for error to be returned from server
						const errorData = await response.json();

						// Notify
						notification.innerHTML = `<p class='error'>${errorData.message || errorMessage}</p>`;
					}
				}

				// Handle server not responding
				catch (error)
				{
					notification.innerHTML = `<p class='error'>${errorMessage}<br>Controleer of de web interface actief is</p>`;
				}

				// Hide waiting indicator
				document.getElementById('waiting').style.display = "none";
			}

			// Function to submit the Spotify name
			async function submitSpotify()
			{
				// Cancel the default action that belongs to the event
				event.preventDefault();

				// Clear old notifications
				document.getElementById('notification_credentials').innerHTML = "";
				document.getElementById('notification_spotify').innerHTML = "";

				// Get notification element
				const notification = document.getElementById('notification_spotify');

				// Get selected network info
				var name = document.getElementById("spotify").value;
				if (name == "")
				{
					notification.innerHTML = "<div class='error'>Kies een naam voor in de Spotifiy app</div>";
					return;
				}

				// Show waiting indicator
				document.getElementById('waiting').style.display = "block";

				// Set error template
				const errorMessage = `Instellen van Spotify naam '${name}' is mislukt`;

				try
				{
					// Send credentials to server
					const response = await fetch('/spotify',
					{
						method: 'POST',
						headers: {'Content-Type': 'application/json'},
						body: JSON.stringify({ "name": name })
					});

					// Handle server response
					if (response.ok)
					{
						name = await response.json();
						document.getElementById("spotify").value = name;
						notification.innerHTML = `<p>Trek de stekker uit de Oradio en steek hem er na 5 seconden weer in<br>Zodra de Oradio opgestart is kunt u de Oradio genaamd '${name}' in de Spotify app kiezen</p>`;
					}
					else
					{
						// Wait for error to be returned from server
						const errorData = await response.json();

						// Notify
						notification.innerHTML = `<p class='error'>${errorData.message || errorMessage}</p>`;
					}
				}

				// Handle server not responding
				catch (error)
				{
					notification.innerHTML = `<p class='error'>${errorMessage}<br>Controleer of de web interface actief is</p>`;
				}

				// Hide waiting indicator
				document.getElementById('waiting').style.display = "none";
			}

			// Run when page is loaded
			document.addEventListener('DOMContentLoaded', function (event)
			{
				// Remove focus
				setTimeout(() =>
				{
					document.querySelectorAll('input').forEach(input =>
					{
						input.style.pointerEvents = 'auto';
					});
				}, 0);

				// Show notifications
				document.getElementById('notification_credentials').style.display = "block";
				document.getElementById('notification_spotify').style.display = "block";

				// Create custom select elements dropdown lists with options and actions
				document.querySelectorAll('.custom-select').forEach(container =>
				{
					const input = container.querySelector('input');
					const dropdown = container.querySelector('.options');

					function showOptions()
					{
						let options = networks;
						options.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));

						dropdown.innerHTML = '';
						options.forEach(option =>
						{
							const div = document.createElement('div');
							div.textContent = option;

							// Add click event handler
							div.addEventListener('click', (event) =>
							{
								// Ignore if nothing changed
								if (input.value !== option)
								{
									// Update input with option
									input.value = option;

									// Hide dropdown with options
									dropdown.style.display = 'none';
								}
							});

							// Add option to list
							dropdown.appendChild(div);
						});

						// Show dropdown
						dropdown.style.display = 'block';
					}

					// Show options when input is clicked
					input.addEventListener("click", (event) =>
					{
						// Prevent click from propagating to document
						event.stopPropagation();

						// Show playlist dropdown
						showOptions();
					});

					// Hide options when input loses focus
					input.addEventListener("focusout", function (event)
					{
						// Cancel the default action that belongs to the event
						event.preventDefault();

						// Delay to allow click on option to be processed
						setTimeout(() =>
						{
							// Hide dropdown
							dropdown.style.display = "none";
						}, 300);
					});

					// Hide options when clicking outside the input or outside the options list
					document.addEventListener("click", function (event)
					{
						if (!container.contains(event.target) && dropdown.style.display == "block")
							dropdown.style.display = "none";
					});

				});

				// Toggle password visibility
				const password = document.getElementById("pswd");
				const togglePassword = document.querySelector(".password-toggle-icon i");
				togglePassword.addEventListener("click", function ()
				{

					if (password.type === "password")
					{
						password.type = "text";
						togglePassword.classList.remove("fa-eye");
						togglePassword.classList.add("fa-eye-slash");
					}
					else
					{
						password.type = "password";
						togglePassword.classList.remove("fa-eye-slash");
						togglePassword.classList.add("fa-eye");
					}
				});

				// Control what happens when the Enter-key is pressed in password input
				document.getElementById("pswd").addEventListener("keydown", function (event)
				{
					// Check if Enter-key is pressed
					if (event.key === "Enter")
					{
						// Prevent default behavior
						event.preventDefault();

						// Submit the Spotify name
						submitCredentials();
					}
				});

				// Control what happens when the Enter-key is pressed in Spotify input
				document.getElementById("spotify").addEventListener("keydown", function (event)
				{
					// Check if Enter-key is pressed
					if (event.key === "Enter")
					{
						// Prevent default behavior
						event.preventDefault();

						// Submit the Spotify name
						submitSpotify();
					}
				});

			});
		</script>
	</head>
	<body>
		{% include "menu.html" %}
		<div class="container">

			<!-- Show Oradio logo -->
			<img src="../static/logo.png" class="logo" />

			<!-- Provide network credentials to connect to -->
			<form method="POST">

				<!-- Network SSID -->
				<h1 >Verbind Oradio met WiFi-netwerk</h1>
				<label for="SSIDs">Netwerk:</label>
				<div class="custom-select">
					<input type="text" id="SSIDs" name="SSIDs" placeholder="-- Selecteer of typ uw WiFi-netwerk --" />
					<span class="custom-icon">&#x25BC;</span> <!-- ▼ icon -->
					<div id="options" class="options"></div>
				</div>

				<!-- Separator -->
				<div style="height: 30px;">&nbsp;</div>

				<!-- Password -->
				<div id="password">
					<label for="pswd">Wachtwoord:</label>
					<input id="pswd" class="pswd-input" type="password" placeholder="Voer WiFi-wachtwoord in" />
					<span class="password-toggle-icon oradio-eye"><i class="fa-regular fa-eye"></i></span>
				</div>
				<button type="submit" onclick="submitCredentials()">Instellen</button>
				<div id="notification_credentials" class="notification">
					<!-- Will be filled by Javascript submitCredentials() -->
				</div>

				<!-- Separator -->
				<div style="height: 30px;">&nbsp;</div>

				<!-- Spotify -->
				<h1 >Kies naam in Spotify app</h1>
				<input id="spotify" type="text" value="{{ spotify }}" placeholder="Voer Spotify naam van Oradio in" />
				<button type="submit" onclick="submitSpotify()">Instellen</button>
				<div id="notification_spotify" class="notification">
					<!-- Will be filled by Javascript submitCredentials() -->
				</div>

			</form>

		</div>
	</body>
</html>
