name: Python Lint & Deprecated Check

on: [push, pull_request, workflow_dispatch]

jobs:
  lint-deprecated:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/oradio_modules.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
        pydevd \
        python3-gi \
        python3-dev \
        python3-dbus \
        python3-jinja2 \
        python3-requests \
        python3-watchdog \
        python3-netifaces
        python -m venv ~/.venv
        source ~/.venv/bin/activate
        python -m pip install --upgrade pip
        pip install -r .github/workflows/oradio_modules.txt

    - name: Run Linters and Deprecated Checks
      run: |
        source ~/.venv/bin/activate
        ARTIFACT_FILE=lint_deprecated_result.txt
        : > $ARTIFACT_FILE

        # Run Pylint
        pylint $(git ls-files '*.py') --rcfile=.github/workflows/.pylintrc \
          --output-format=parseable >> $ARTIFACT_FILE || true
        count_pylint=$(grep -c '^[^:]\+:[0-9]\+:[0-9]\+: [A-Z][0-9]\{4\}:' $ARTIFACT_FILE || echo 0)

        # Run Ruff
        ruff check . --select F,D,ERA --extend-ignore D203,D213 >> $ARTIFACT_FILE || true
        count_ruff=$(grep -i 'deprecated\|ERA' $ARTIFACT_FILE | wc -l | tr -d ' ')

        # Runtime deprecations
        python3 .github/workflows/check_deprecated.py .github/workflows/oradio_modules.txt >> $ARTIFACT_FILE 2>&1
        count_runtime=$(grep -i '⚠️' $ARTIFACT_FILE | wc -l | tr -d ' ')

        # Determine emoji + color
        pylint_emoji=$([ "$count_pylint" -eq 0 ] && echo "✅" || echo "❌")
        pylint_color=$([ "$count_pylint" -eq 0 ] && echo "green" || echo "red")

        ruff_emoji=$([ "$count_ruff" -eq 0 ] && echo "✅" || echo "⚠️")
        ruff_color=$([ "$count_ruff" -eq 0 ] && echo "green" || echo "orange")

        runtime_emoji=$([ "$count_runtime" -eq 0 ] && echo "✅" || echo "⚠️")
        runtime_color=$([ "$count_runtime" -eq 0 ] && echo "green" || echo "orange")

        # Write summary to GitHub
        echo "### 🧹 Python Lint & Deprecated Summary" >> $GITHUB_STEP_SUMMARY
        echo "<span style='color:$pylint_color'>Pylint: $count_pylint $pylint_emoji</span> | <span style='color:$ruff_color'>Ruff: $count_ruff $ruff_emoji</span> | <span style='color:$runtime_color'>Runtime: $count_runtime $runtime_emoji</span>" >> $GITHUB_STEP_SUMMARY

    - name: Upload combined artifact
      uses: actions/upload-artifact@v4
      with:
        name: lint_deprecated_result.txt
        path: lint_deprecated_result.txt
        if-no-files-found: ignore
