name: Python Lint & Deprecated Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-deprecated:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v7

      # -----------------------------------------------------------------------
      # 2. Pin Python version for reproducible results
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # -----------------------------------------------------------------------
      # 3. Cache pip downloads (keyed on the requirements file)
      # -----------------------------------------------------------------------
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/workflows/oradio_modules.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # 4. System-level dependencies (GObject / DBus / watchdog headers)
      # -----------------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-gi \
            python3-dev \
            python3-gi \
            python3-dbus

      # -----------------------------------------------------------------------
      # 5. Python dependencies inside a venv that can see system site-packages
      # -----------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m venv --system-site-packages ~/.venv
          source ~/.venv/bin/activate
          pip install --upgrade pip
          pip install -r .github/workflows/oradio_modules.txt
          # Linting / analysis tools (pinned to avoid surprise breakage)
          pip install \
            "pylint>=3.0,<4" \
            "ruff>=0.4,<1" \
            "mypy>=1.9,<2"

      # -----------------------------------------------------------------------
      # 6. Run all checks
      # -----------------------------------------------------------------------
      - name: Run Linters and Deprecated Checks
        run: |
          source ~/.venv/bin/activate
          export PYTHONPATH="$GITHUB_WORKSPACE/Main:$GITHUB_WORKSPACE/module_test"

          # Collect all output into a single result file
          RESULT_FILE=lint_deprecated_result.txt
          : > "$RESULT_FILE"

          # Do not stop on first non-zero exit; we collect all results first
          set +e

          # -----------------------------------------------------------------
          # Pylint – covers Main/ and module_test/
          # -----------------------------------------------------------------
          echo "### 🧹 Pylint analysis results" >> "$RESULT_FILE"
          pylint Main/*.py module_test/*.py \
            --rcfile=.github/workflows/.pylintrc \
            --output-format=text >> "$RESULT_FILE" 2>&1
          pylint_count=$(grep -Ec '^[^:]+:[0-9]+:[0-9]+: [A-Z][0-9]{4}:' "$RESULT_FILE" || echo 0)
          if [ "$pylint_count" -eq 0 ]; then
            echo "Pylint found no issues." >> "$RESULT_FILE"
          fi
          echo >> "$RESULT_FILE"

          # -----------------------------------------------------------------
          # Ruff – static deprecation check via UP (pyupgrade) ruleset.
          # UP, fix diff flags deprecated builtins, stdlib aliases, and typing constructs.
          # Covers both Main/ and module_test/.
          # -----------------------------------------------------------------
          #  --select UP --fix --diff \
          #  --ignore UP031,UP032,UP034,UP035 \
          echo "### 🧹 Ruff static deprecation analysis results" >> "$RESULT_FILE"
          ruff check Main module_test \
            --select UP \
            --output-format=github >> "$RESULT_FILE" 2>&1
          count_ruff=$(grep -Ec '^\S+\.py:[0-9]+' "$RESULT_FILE" || echo 0)
          if [ "$count_ruff" -eq 0 ]; then
            echo "Static deprecation check found no warnings." >> "$RESULT_FILE"
          fi
          echo >> "$RESULT_FILE"

          # -----------------------------------------------------------------
          # Mypy – static type checking (deprecated typed APIs surfaced here)
          # -----------------------------------------------------------------
          echo "### 🧹 Mypy type-check results" >> "$RESULT_FILE"
          mypy Main module_test \
            --ignore-missing-imports \
            --no-error-summary >> "$RESULT_FILE" 2>&1
          count_mypy=$(grep -c ': error:' "$RESULT_FILE" || echo 0)
          if [ "$count_mypy" -eq 0 ]; then
            echo "Mypy found no type errors." >> "$RESULT_FILE"
          fi
          echo >> "$RESULT_FILE"

          # -----------------------------------------------------------------
          # Runtime deprecation check – imports every module under Main/ and
          # module_test/ and flushes queued DeprecationWarnings.
          # The script exits 1 when any deprecations are found.
          # -----------------------------------------------------------------
          echo "### 🧹 Runtime deprecation analysis results" >> "$RESULT_FILE"
          python3 module_test/deprecation_check.py >> "$RESULT_FILE" 2>&1
          runtime_exit=$?
          count_runtime=$(grep -Ec '^DEPRECATION \(' "$RESULT_FILE" || echo 0)
          if [ "$count_runtime" -eq 0 ] && [ "$runtime_exit" -eq 0 ]; then
            echo "Runtime check found no deprecation warnings." >> "$RESULT_FILE"
          fi
          echo >> "$RESULT_FILE"

          # -----------------------------------------------------------------
          # Build the GitHub Step Summary as a Markdown table
          # (inline style= attributes are not rendered by GitHub)
          # -----------------------------------------------------------------
          pylint_status=$( [ "$pylint_count"  -eq 0 ] && echo "✅ Pass" || echo "❌ Fail")
          ruff_status=$(   [ "$count_ruff"    -eq 0 ] && echo "✅ Pass" || echo "⚠️ Warn")
          mypy_status=$(   [ "$count_mypy"    -eq 0 ] && echo "✅ Pass" || echo "⚠️ Warn")
          runtime_status=$([ "$count_runtime" -eq 0 ] && echo "✅ Pass" || echo "⚠️ Warn")

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ### 🧹 Python Lint & Deprecation Summary

          | Check | Issues found | Status |
          |---|---|---|
          | Pylint (lint)              | $pylint_count  | $pylint_status  |
          | Ruff UP (static deprec.)   | $count_ruff    | $ruff_status    |
          | Mypy (type errors)         | $count_mypy    | $mypy_status    |
          | Runtime deprecations       | $count_runtime | $runtime_status |

          count_runtime='$count_runtime'
          runtime_status='$runtime_status'

          EOF

          # -----------------------------------------------------------------
          # Fail the job only when there are real issues
          # -----------------------------------------------------------------
          total=$((pylint_count + count_ruff + count_mypy + count_runtime))
          if [ "$total" -eq 0 ] && [ "$runtime_exit" -eq 0 ]; then
            echo "All checks passed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### 🚨 Please address the issues above to maintain code quality." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

        shell: bash

      # -----------------------------------------------------------------------
      # 7. Upload the full result file for inspection (kept for 14 days)
      # -----------------------------------------------------------------------
      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint_deprecated_results
          path: lint_deprecated_result.txt
          retention-days: 14
          if-no-files-found: ignore
